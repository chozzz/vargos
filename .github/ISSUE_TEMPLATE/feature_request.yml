name: Feature Request
description: Propose a new feature or enhancement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Describe the use case, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to see? Be concrete — which command, which config field, which behavior changes.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What workarounds have you tried? Are there other ways this could be solved?
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, screenshots, related issues, or anything else that helps.
