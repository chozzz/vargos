name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm run typecheck
      - run: pnpm run test:run
      - run: pnpm lint
      - run: pnpm run build
      - name: Smoke test (boot + timeout)
        run: timeout 10 node dist/index.js || [ $? -eq 124 ]
